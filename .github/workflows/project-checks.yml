name: Project checks

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate notebook JSON
        run: |
          python -m json.tool notebooks/aerial_object_detection_yolov8.ipynb > /dev/null
          python -m json.tool notebooks/drone_classification.ipynb > /dev/null
